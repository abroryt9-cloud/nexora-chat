<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="login" class="screen active">
  <div class="center">
    <h2>Nexora</h2>
    <input id="username" placeholder="Введите имя">
    <button onclick="start()">Войти</button>
  </div>
</div>

<div id="app" class="screen">
  <div class="app">

    <!-- sidebar -->
    <div class="sidebar">
      <div class="topbar">
        <span>Nexora</span>
      </div>
      <div id="chatList"></div>
    </div>

    <!-- chat -->
    <div class="chat">
      <div class="chat-header">
        <span id="chatTitle">Общий чат</span>
      </div>

      <div id="messages" class="messages"></div>

      <div class="bottom">
        <input id="msgInput" placeholder="Сообщение...">
        <button onclick="send()">➤</button>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
