<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora - Космический Мессенджер</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e0e0ff;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Stars background */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.5rem;
    }

    .logo-text h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #00b4d8, #90e0ef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: #8892b0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 0.875rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }

    .status-dot.connected {
      background: #10b981;
      box-shadow: 0 0 10px #10b981;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(0, 180, 216, 0.3);
      border-radius: 3px;
    }

    .message {
      max-width: 70%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.own {
      align-self: flex-end;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 4px;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }

    .message-sender {
      font-size: 0.75rem;
      font-weight: 600;
      color: #90e0ef;
    }

    .message-time {
      font-size: 0.7rem;
      color: #8892b0;
    }

    .message-text {
      font-size: 0.9rem;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #8892b0;
    }

    .empty-state-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 1rem;
      background: rgba(0, 180, 216, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    /* Input */
    .input-area {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2rem;
    }

    .input-form {
      display: flex;
      gap: 0.75rem;
    }

    .username-input {
      width: 150px;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #e0e0ff;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .username-input:focus {
      border-color: #00b4d8;
    }

    .message-input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #e0e0ff;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .message-input:focus {
      border-color: #00b4d8;
    }

    .message-input::placeholder {
      color: #8892b0;
    }

    .send-button {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .send-button:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
    }

    .send-button:active {
      transform: scale(0.95);
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.75rem;
      color: #8892b0;
    }
  </style>
</head>
<body>
  <!-- Stars background -->
  <div class="stars" id="stars"></div>

  <div class="container">
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">N</div>
        <div class="logo-text">
          <h1>Nexora</h1>
          <p>Космический мессенджер</p>
        </div>
      </div>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Отключено</span>
      </div>
    </header>

    <!-- Messages -->
    <main class="messages" id="messages">
      <div class="empty-state">
        <div>
          <div class="empty-state-icon">💬</div>
          <h3>Добро пожаловать в Nexora!</h3>
          <p style="margin-top: 0.5rem; max-width: 300px;">
            Отправьте первое сообщение в этом космическом чате
          </p>
        </div>
      </div>
    </main>

    <!-- Input -->
    <footer class="input-area">
      <form class="input-form" id="messageForm">
        <input
          type="text"
          class="username-input"
          id="usernameInput"
          placeholder="Ваше имя"
          maxlength="20"
        />
        <input
          type="text"
          class="message-input"
          id="messageInput"
          placeholder="Напишите сообщение..."
          autocomplete="off"
        />
        <button type="submit" class="send-button" id="sendButton">
          Отправить
        </button>
      </form>
      <div class="footer">
        Нажмите Enter для отправки сообщения
      </div>
    </footer>
  </div>

  <script>
    // Generate or load username
    let username = localStorage.getItem('nexora_username');
    if (!username) {
      username = 'User_' + Math.random().toString(36).substr(2, 6);
      localStorage.setItem('nexora_username', username);
    }
    document.getElementById('usernameInput').value = username;

    // Save username on change
    document.getElementById('usernameInput').addEventListener('change', (e) => {
      username = e.target.value.trim() || username;
      localStorage.setItem('nexora_username', username);
    });

    // Create stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }

    // Connect to WebSocket
    const socket = io();

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const messagesContainer = document.getElementById('messages');
    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    // Connection status
    socket.on('connect', () => {
      statusDot.classList.add('connected');
      statusText.textContent = 'Подключено';
      socket.emit('auth', { userId: username });
    });

    socket.on('disconnect', () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Отключено';
    });

    socket.on('auth_ok', (data) => {
      console.log('Auth OK:', data);
    });

    socket.on('message', (data) => {
      addMessage(data);
    });

    // Add message to UI
    function addMessage(data) {
      // Remove empty state if exists
      const emptyState = messagesContainer.querySelector('.empty-state');
      if (emptyState) {
        emptyState.remove();
      }

      const isOwn = data.senderId === username;
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
      
      const time = new Date(data.time).toLocaleTimeString('ru-RU', {
        hour: '2-digit',
        minute: '2-digit'
      });

      messageDiv.innerHTML = `
        <div class="message-header">
          <span class="message-sender">${data.senderName}</span>
          <span class="message-time">${time}</span>
        </div>
        <div class="message-text">${escapeHtml(data.text)}</div>
      `;

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Send message
    messageForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const text = messageInput.value.trim();
      if (!text || !socket.connected) return;

      const message = {
        id: Date.now().toString(),
        text: text,
        senderId: username,
        senderName: username,
        time: Date.now()
      };

      socket.emit('message', message);
      messageInput.value = '';
    });

    // Focus input on load
    messageInput.focus();
  </script>
</body>
</html>
