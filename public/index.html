<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora - Мессенджер</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Login Screen */
    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-screen.hidden {
      display: none;
    }

    .login-card {
      background: rgba(30, 30, 30, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(42, 155, 143, 0.2);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #2a9b8f, #20c997);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 10px 30px rgba(42, 155, 143, 0.3);
    }

    .login-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #2a9b8f, #20c997);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .login-input {
      width: 100%;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(42, 155, 143, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
      margin-bottom: 1.5rem;
    }

    .login-input:focus {
      border-color: #2a9b8f;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(42, 155, 143, 0.2);
    }

    .login-input::placeholder {
      color: #666;
    }

    .login-button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #2a9b8f, #20c997);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 20px rgba(42, 155, 143, 0.3);
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(42, 155, 143, 0.4);
    }

    .login-button:active {
      transform: translateY(0);
    }

    /* Chat Screen */
    .chat-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #0f0f0f;
    }

    .chat-screen.hidden {
      display: none;
    }

    /* Header */
    .chat-header {
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(42, 155, 143, 0.2);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-logo {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #2a9b8f, #20c997);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
    }

    .header-info h1 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .header-info p {
      font-size: 0.85rem;
      color: #888;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(42, 155, 143, 0.1);
      border-radius: 20px;
      font-size: 0.85rem;
      color: #2a9b8f;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s infinite;
    }

    .status-dot.connected {
      background: #10b981;
      box-shadow: 0 0 10px #10b981;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .logout-button {
      padding: 0.5rem 1rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #ef4444;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .logout-button:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Messages */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: rgba(42, 155, 143, 0.3);
      border-radius: 3px;
    }

    .message {
      max-width: 70%;
      padding: 0.75rem 1.25rem;
      border-radius: 18px;
      animation: messageSlide 0.3s ease-out;
      position: relative;
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.own {
      align-self: flex-end;
      background: linear-gradient(135deg, #2a9b8f, #20c997);
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: rgba(40, 40, 40, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 4px;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }

    .message-sender {
      font-size: 0.75rem;
      font-weight: 600;
      color: #2a9b8f;
    }

    .message.own .message-sender {
      color: rgba(255, 255, 255, 0.9);
    }

    .message-time {
      font-size: 0.7rem;
      color: #666;
    }

    .message.own .message-time {
      color: rgba(255, 255, 255, 0.7);
    }

    .message-text {
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #666;
    }

    .empty-state-content {
      max-width: 400px;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #888;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    /* Input Area */
    .input-area {
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(42, 155, 143, 0.2);
      padding: 1.5rem 2rem;
    }

    .input-form {
      display: flex;
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .message-input {
      flex: 1;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(42, 155, 143, 0.2);
      border-radius: 24px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    .message-input:focus {
      border-color: #2a9b8f;
      background: rgba(255, 255, 255, 0.08);
    }

    .message-input::placeholder {
      color: #666;
    }

    .send-button {
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #2a9b8f, #20c997);
      border: none;
      border-radius: 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .send-button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(42, 155, 143, 0.4);
    }

    .send-button:active {
      transform: scale(0.95);
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .send-icon {
      width: 20px;
      height: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-card {
        padding: 2rem;
        margin: 1rem;
      }

      .chat-header {
        padding: 1rem;
      }

      .messages-container {
        padding: 1rem;
      }

      .input-area {
        padding: 1rem;
      }

      .message {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-icon">N</div>
      <h1 class="login-title">Nexora</h1>
      <p class="login-subtitle">Добро пожаловать в мессенджер</p>
      <form id="loginForm">
        <input
          type="text"
          class="login-input"
          id="usernameInput"
          placeholder="Введите ваше имя"
          maxlength="20"
          required
          autofocus
        />
        <button type="submit" class="login-button">
          Войти в чат
        </button>
      </form>
    </div>
  </div>

  <!-- Chat Screen -->
  <div class="chat-screen hidden" id="chatScreen">
    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <div class="header-logo">N</div>
        <div class="header-info">
          <h1>Nexora</h1>
          <p id="currentUsername">Гость</p>
        </div>
      </div>
      <div class="header-right">
        <div class="connection-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Отключено</span>
        </div>
        <button class="logout-button" id="logoutButton">
          Выйти
        </button>
      </div>
    </header>

    <!-- Messages -->
    <main class="messages-container" id="messagesContainer">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-content">
          <div class="empty-state-icon">💬</div>
          <h3>Добро пожаловать в Nexora!</h3>
          <p>Отправьте первое сообщение в этом чате</p>
        </div>
      </div>
    </main>

    <!-- Input -->
    <footer class="input-area">
      <form class="input-form" id="messageForm">
        <input
          type="text"
          class="message-input"
          id="messageInput"
          placeholder="Напишите сообщение..."
          autocomplete="off"
        />
        <button type="submit" class="send-button" id="sendButton">
          <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Отправить
        </button>
      </form>
    </footer>
  </div>

  <script>
    // DOM Elements
    const loginScreen = document.getElementById('loginScreen');
    const chatScreen = document.getElementById('chatScreen');
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('usernameInput');
    const currentUsername = document.getElementById('currentUsername');
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyState = document.getElementById('emptyState');
    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const logoutButton = document.getElementById('logoutButton');

    // State
    let username = '';
    let socket = null;

    // Load saved username
    const savedUsername = localStorage.getItem('nexora_username');
    if (savedUsername) {
      usernameInput.value = savedUsername;
    }

    // Login
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = usernameInput.value.trim();
      if (!name) return;

      username = name;
      localStorage.setItem('nexora_username', username);
      currentUsername.textContent = username;
      
      // Show chat screen
      loginScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
      
      // Connect to WebSocket
      connectWebSocket();
    });

    // Logout
    logoutButton.addEventListener('click', () => {
      if (socket) {
        socket.disconnect();
      }
      chatScreen.classList.add('hidden');
      loginScreen.classList.remove('hidden');
      messagesContainer.innerHTML = '';
      messagesContainer.appendChild(emptyState);
      emptyState.style.display = 'flex';
    });

    // Connect to WebSocket
    function connectWebSocket() {
      const apiUrl = window.location.origin;
      console.log('[WebSocket] Connecting to:', apiUrl);
      
      socket = io(apiUrl, {
        transports: ['websocket'],
        reconnection: true,
        reconnectionAttempts: 10,
        reconnectionDelay: 1000,
      });

      socket.on('connect', () => {
        console.log('[WebSocket] Connected:', socket.id);
        statusDot.classList.add('connected');
        statusText.textContent = 'Подключено';
        socket.emit('auth', { userId: username });
      });

      socket.on('disconnect', () => {
        console.log('[WebSocket] Disconnected');
        statusDot.classList.remove('connected');
        statusText.textContent = 'Отключено';
      });

      socket.on('connect_error', (error) => {
        console.error('[WebSocket] Connection error:', error);
        statusDot.classList.remove('connected');
        statusText.textContent = 'Ошибка';
      });

      socket.on('auth_ok', (data) => {
        console.log('[WebSocket] Auth OK:', data);
      });

      socket.on('message', (data) => {
        console.log('[WebSocket] Message received:', data);
        addMessage(data);
      });
    }

    // Add message to UI
    function addMessage(data) {
      // Remove empty state
      if (emptyState.parentNode === messagesContainer) {
        emptyState.remove();
      }

      const isOwn = data.senderId === username;
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
      
      const time = new Date(data.time).toLocaleTimeString('ru-RU', {
        hour: '2-digit',
        minute: '2-digit'
      });

      messageDiv.innerHTML = `
        <div class="message-header">
          <span class="message-sender">${escapeHtml(data.senderName)}</span>
          <span class="message-time">${time}</span>
        </div>
        <div class="message-text">${escapeHtml(data.text)}</div>
      `;

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Send message
    messageForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const text = messageInput.value.trim();
      if (!text || !socket || !socket.connected) return;

      const message = {
        id: Date.now().toString(),
        text: text,
        senderId: username,
        senderName: username,
        time: Date.now()
      };

      socket.emit('message', message);
      messageInput.value = '';
      messageInput.focus();
    });

    // Focus input on load (when chat is visible)
    chatScreen.addEventListener('click', () => {
      messageInput.focus();
    });
  </script>
</body>
</html>
