services:
  # Backend API 
  - type: web
    name: nexora-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: |
      echo "📦 Installing dependencies..."
      npm install
      echo "🔨 Building shared types..."
      cd shared && npm install && npm run build && cd ..
      echo "🔨 Building server..."
      cd server && npm install && npm run build && cd ..
      echo "✅ Backend build complete"
    startCommand: cd server && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        fromDatabase:
          name: nexora-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CLIENT_URL
        value: https://nexora-client.onrender.com

  # Frontend Client
  - type: web
    name: nexora-client
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: |
      echo "📦 Installing client dependencies..."
      npm install
      cd client && npm install
      echo "🔨 Building client..."
      npm run build
      echo "✅ Client build complete"
    startCommand: cd client && npx vite preview --port $PORT --host
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: https://nexora-api.onrender.com/api/v1
      - key: VITE_WS_URL
        value: wss://nexora-api.onrender.com
      - key: VITE_APP_TITLE
        value: Nexora Messenger

databases:
  - name: nexora-db
    plan: free
    region: frankfurt
    databaseName: nexora
    user: nexora_user
