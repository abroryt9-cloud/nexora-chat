services:
  # Backend API (Root server.js)
  - type: web
    name: nexora-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        fromDatabase:
          name: nexora-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CLIENT_URL
        value: https://nexora-client.onrender.com

  # Frontend Client (опционально, можно объединить с backend)
  - type: web
    name: nexora-client
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm run preview -- --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: https://nexora-api.onrender.com/api/v1
      - key: VITE_WS_URL
        value: wss://nexora-api.onrender.com

databases:
  - name: nexora-db
    plan: free
    region: frankfurt
    databaseName: nexora
    user: nexora_user
